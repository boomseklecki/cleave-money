# Backend test suite. Runs the SAME script as local (scripts/test-backend.sh) so CI can't pass
# differently than `bash scripts/test-backend.sh` on a dev box. Advisory by design - if GitHub Actions
# is degraded, the local script is the source of truth; don't make this a required merge gate until it's
# proven stable here. Path-filtered: a relay-only change never triggers this.
name: backend-ci

on:
  push:
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - "scripts/test-backend.sh"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - "scripts/test-backend.sh"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # a hung runner fails fast instead of hanging
    steps:
      - uses: actions/checkout@v4
      # Docker + compose are preinstalled on ubuntu-latest. The script pre-pulls the pull_policy:never
      # images (postgres:16, minio/minio:latest), brings up the test profile, migrates, and runs the suite.
      - name: Run backend suite (same script as local)
        run: bash scripts/test-backend.sh
